name: validate

# PR gate: validate the vendored OpenAPI spec on every pull request, so a
# spec the pinned generator rejects blocks the merge. Runs the script behind
# `make validate-spec` (see README §"CI/CD & publishing → validate.yaml").
on:
  pull_request:

# Read-only: this job only checks out and validates; it writes nothing.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Reproducibility gate: the vendored spec must match the sha256 pinned in
      # spec/spec-lock.json, so a hand-edited spec or a stale lock fails the PR.
      # Offline and deterministic (no network, no Java), so it runs first and
      # never flakes on upstream drift (see README §"Versioning & reproducibility").
      - run: make check-spec-lock
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: make validate-spec
