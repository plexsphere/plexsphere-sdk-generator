name: validate

# PR gate: validate the vendored OpenAPI spec on every pull request, so a
# spec the pinned generator rejects blocks the merge. Runs the script behind
# `make validate-spec` (see README §"CI/CD & publishing → validate.yaml").
on:
  pull_request:

# Read-only: this job only checks out and validates; it writes nothing.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: make validate-spec
